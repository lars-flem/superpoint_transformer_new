# @package _global_

# Optuna hyperparameter search for Norway Binary SPT
# No preprocessing params here — only training-time params to avoid re-preprocessing

defaults:
  - override /hydra/sweeper: optuna

optimized_metric: "val/miou_best"

hydra:
  sweeper:
    _target_: hydra_plugins.hydra_optuna_sweeper.optuna_sweeper.OptunaSweeper
    sampler:
      _target_: optuna.samplers.TPESampler
      seed: 123
      n_startup_trials: 5
    direction: maximize
    n_trials: 15
    storage: "sqlite:////cluster/home/larshfle/superpoint_transformer_new/logs/optuna_norway_binary.db"
    study_name: norway_binary_optuna
    params:
      # Learning rate and regularization
      model.optimizer.lr: interval(0.001, 0.05)
      model.optimizer.weight_decay: interval(1e-5, 1e-3)

      # Augmentation / dropout (no re-preprocessing needed)
      datamodule.h_edge_feat_drop: interval(0.1, 0.6)
      datamodule.rgb_drop: interval(0.1, 0.6)
      # node_feat_drop removed: node features are 1D tensors, column dropout crashes on dim=1
      datamodule.pos_jitter: interval(0.01, 0.15)
      datamodule.anisotropic_scaling: interval(0.1, 0.4)

      # Batch sampling
      datamodule.sample_graph_k: choice(2, 4)
      datamodule.sample_graph_r: choice(30, 50, 75)



